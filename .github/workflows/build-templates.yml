name: Build email templates

on:
  push:
    branches:
      - main
    paths:
      - "emails/**"
      - "scripts/build-templates.ts"

  # También permite correrlo manualmente desde GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compile templates to HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build templates
        run: npm run build

      - name: Commit dist/ if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: rebuild email templates [skip ci]"
          git push
